<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FortiGate Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-dashboard" viewBox="0 0 24 24">
        <path d="M4 13h6V4H4v9zm10 7h6V4h-6v16zM4 20h6v-5H4v5z"></path>
    </symbol>
    <symbol id="icon-clients" viewBox="0 0 24 24">
        <path d="M16 11a4 4 0 1 0-3.9-4.9A5 5 0 0 1 16 11zM8 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-3.3 0-6 1.7-6 3.8V20h12v-2.2C14 15.7 11.3 14 8 14zm8-.5c-.8 0-1.5.1-2.2.3 1.4 1 2.2 2.3 2.2 4V20h6v-2.1c0-2.4-2.7-4.4-6-4.4z"></path>
    </symbol>
    <symbol id="icon-quota" viewBox="0 0 24 24">
        <path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3zm0 4 4 1.5V11c0 3-1.6 5.8-4 7-2.4-1.2-4-4-4-7V7.5L12 6z"></path>
    </symbol>
    <symbol id="icon-portal" viewBox="0 0 24 24">
        <path d="M4 5h16v10H4V5zm2 2v6h12V7H6zm3 10h6l1 2h3v2H5v-2h3l1-2z"></path>
    </symbol>
    <symbol id="icon-health" viewBox="0 0 24 24">
        <path d="M12 21s-8-4.6-8-11a5 5 0 0 1 8-4 5 5 0 0 1 8 4c0 6.4-8 11-8 11zm-1-6h2v-2h2v-2h-2V9h-2v2H9v2h2v2z"></path>
    </symbol>
    <symbol id="icon-events" viewBox="0 0 24 24">
        <path d="M5 4h14v3H5V4zm0 6h14v3H5v-3zm0 6h9v3H5v-3zm12.5 3.5 4-4-1.4-1.4-2.6 2.6-1.1-1.1-1.4 1.4 2.5 2.5z"></path>
    </symbol>
    <symbol id="icon-settings" viewBox="0 0 24 24">
        <path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2h-4l-.4 2.5A8 8 0 0 0 7 6L4.6 5l-2 3.5 2 1.5A8.5 8.5 0 0 0 4.5 12c0 .5 0 1 .1 1.5l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6 1.5L10 22h4l.4-2.5A8 8 0 0 0 17 18l2.4 1 2-3.5-2-1.5zM12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7z"></path>
    </symbol>
</svg>

<div class="layout">

    <aside class="sidebar">
        <div>
            <div class="brand">
                <span class="brand-mark">FG</span>
                <div>
                    <strong>FortiGate</strong>
                    <small>Security Monitor</small>
                </div>
            </div>

            <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="primary-nav">
                <span></span>
                <span></span>
                <span></span>
                Menu
            </button>

            <nav id="primary-nav">
                <a class="{{ 'active' if request.path == '/' else '' }}" href="/">
                    <svg class="icon"><use href="#icon-dashboard"></use></svg> Dashboard
                </a>
                <a class="{{ 'active' if request.path == '/clients' else '' }}" href="/clients">
                    <svg class="icon"><use href="#icon-clients"></use></svg> Clientes
                </a>
                <a class="{{ 'active' if request.path == '/quotas' else '' }}" href="/quotas">
                    <svg class="icon"><use href="#icon-quota"></use></svg> Cuotas
                </a>
                <a class="{{ 'active' if request.path == '/portal' else '' }}" href="/portal">
                    <svg class="icon"><use href="#icon-portal"></use></svg> Portal Cautivo
                </a>
                <a class="{{ 'active' if request.path == '/health' else '' }}" href="/health">
                    <svg class="icon"><use href="#icon-health"></use></svg> Health Center
                </a>
                <a class="{{ 'active' if request.path == '/events' else '' }}" href="/events">
                    <svg class="icon"><use href="#icon-events"></use></svg> Eventos
                </a>
                <a class="{{ 'active' if request.path == '/settings' else '' }}" href="/settings">
                    <svg class="icon"><use href="#icon-settings"></use></svg> Configuracion
                </a>
            </nav>
        </div>

        <div class="userbox">
            <span class="status-pill">Online</span>
            <div class="user-name">{{ session.get("username") }}</div>
            <small>Administrador</small>
            <a href="/logout">Cerrar sesion</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <div>
                <strong>Centro de Operaciones</strong>
                <span>Monitoreo de trafico y control de acceso</span>
            </div>
            <span class="health-badge">Firewall Online</span>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>

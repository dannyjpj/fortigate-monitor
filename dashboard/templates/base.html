<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FortiGate Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="brand">FortiGate Monitor</div>

        <nav>
            <a href="/">Dashboard</a>
            <a href="/quotas">Cuotas</a>
            <a href="/portal">Portal Cautivo</a>
        </nav>

        <div class="userbox">
            <div>Usuario: {{ session.get("username") }}</div>
            <a href="/logout">Cerrar sesion</a>
        </div>
    </aside>

    <main class="main">
        <div class="topbar">
            <span>Estado: Online</span>
        </div>

        <div class="container">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>

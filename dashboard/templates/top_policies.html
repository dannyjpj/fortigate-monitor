<table>

<thead>
<tr>
    <th>Política</th>
    <th>Conexiones</th>
    <th>Tráfico</th>
</tr>
</thead>

<tbody id="tabla_policies">

{% for row in dashboard.top_policies %}
<tr>
    <td data-label="Politica">{{ row.policyname or "-" }}</td>
    <td data-label="Conexiones">{{ row.conexiones }}</td>
    <td data-label="Trafico">{{ row.bytes | bytes }}</td>
</tr>
{% endfor %}

</tbody>

</table>

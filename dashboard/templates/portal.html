{% extends "base.html" %}
{% block content %}

<h1>Portal Cautivo</h1>

<p><a href="/">Volver al Dashboard</a></p>
<p><a href="/download/captive-passwords">Descargar CSV</a></p>

<table border="1" cellpadding="8" cellspacing="0" width="100%">
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Usuario</th>
            <th>Password</th>
            <th>Accion</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u["fecha"] }}</td>
            <td>{{ u["usuario"] }}</td>
            <td>
                <span class="password-mask">********</span>
                <span class="password-real" style="display:none;">{{ u["password"] }}</span>
                <button type="button" onclick="togglePassword(this)">Mostrar</button>
            </td>
            <td>
                <button onclick="resetUser('{{ u['usuario'] }}')">
                    Reset password
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
function resetUser(username) {
    if (!confirm("Resetear password de " + username + "?")) {
        return;
    }

    fetch("/api/portal/reset/" + username, {
        method: "POST"
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "ok") {
            alert("Password actualizado para " + username);
            location.reload();
        } else {
            alert("Error reseteando password");
            console.log(data);
        }
    })
    .catch(err => {
        console.error(err);
        alert("Error de comunicacion");
    });
}

function togglePassword(btn) {
    const td = btn.parentElement;
    const mask = td.querySelector(".password-mask");
    const real = td.querySelector(".password-real");

    if (real.style.display === "none") {
        mask.style.display = "none";
        real.style.display = "inline";
        btn.textContent = "Ocultar";
    } else {
        mask.style.display = "inline";
        real.style.display = "none";
        btn.textContent = "Mostrar";
    }
}

</script>

{% endblock %}

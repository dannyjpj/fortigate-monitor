<table>

<thead>
<tr>
    <th>Destino</th>
    <th>Conexiones</th>
    <th>Tráfico</th>
</tr>
</thead>

<tbody id="tabla_destinations">

{% for row in dashboard.top_destinations %}
<tr>
    <td data-label="Destino">{{ row.dstip }}</td>
    <td data-label="Conexiones">{{ row.conexiones }}</td>
    <td data-label="Trafico">{{ row.bytes | bytes }}</td>
</tr>
{% endfor %}

</tbody>

</table>

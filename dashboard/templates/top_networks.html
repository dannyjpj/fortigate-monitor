<table>

<thead>
<tr>
    <th>Red</th>
    <th>Conexiones</th>
    <th>Tráfico</th>
</tr>
</thead>

<tbody id="tabla_networks">

{% for row in dashboard.traffic_networks %}
<tr>
    <td data-label="Red">{{ row.network }}</td>
    <td data-label="Conexiones">{{ row.conexiones }}</td>
    <td data-label="Trafico">{{ row.bytes | bytes }}</td>
</tr>
{% endfor %}

</tbody>

</table>

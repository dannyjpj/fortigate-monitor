<table>

<thead>

<tr>

<th>IP</th>
<th>MAC</th>
<th>Nombre</th>
<th>Red</th>
<th>Bytes</th>

</tr>

</thead>

<tbody id="tabla_ips">

{% for row in dashboard.top_ips %}

<tr>

<td data-label="IP">{{ row.srcip }}</td>
<td data-label="MAC"><span class="mono-value">{{ row.srcmac or "-" }}</span></td>
<td data-label="Nombre">{{ row.srcname }}</td>
<td data-label="Red">{{ row.network }}</td>
<td data-label="Bytes">{{ row.bytes | bytes }}</td>

</tr>

{% endfor %}

</tbody>

</table>
